name: Refresh OpenTree Taxonomy

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 1 * *"

permissions:
  contents: write

jobs:
  refresh-taxonomy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh OpenTree taxonomy artifacts
        run: make taxonomy-refresh
        env:
          MPLCONFIGDIR: /tmp/matplotlib

      - name: Commit updates (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/opentree_release_metadata.json data/processed/opentree_metazoa_phyla.csv docs/assets/metazoa_phyla_snapshot.png docs/assets/metazoa_hierarchy_complex.png || true
          if git diff --cached --quiet; then
            echo "No taxonomy updates to commit"
          else
            git commit -m "chore: refresh OpenTree Metazoa taxonomy artifacts"
            git push
          fi
